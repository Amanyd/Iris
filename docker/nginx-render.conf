# Nginx reverse proxy — multiplexes Render's single $PORT
# into iris-core (:3000) and iris-hooks (:8080).
#
# Routing:
#   /hooks/*  →  iris-hooks (webhook ingestion)
#   /*        →  iris-core  (API + health)

# Render sets the PORT env var; nginx substitutes it via envsubst at startup.
# The start-all.sh script handles the envsubst call.

server {
    listen ${NGINX_PORT};

    # Webhook ingestion → iris-hooks
    location /hooks/ {
        proxy_pass http://127.0.0.1:8080/hooks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → iris-core (API + health)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

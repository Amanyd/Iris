services:
  postgres:
    image: postgres:15-alpine
    container_name: iris-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iris
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d iris"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:alpine
    container_name: iris-nats
    ports:
      - "4222:4222"
      - "8222:8222" # NATS monitoring port
    command: ["-js", "-m", "8222"]

volumes:
  postgres_data:
